openapi: 3.0.0
info:
  title: Book Management API
  description: API đơn giản để quản lý thư viện sách bằng Flask
  version: 1.0.0


paths:
  /books:
    get:
      summary: Lấy danh sách toàn bộ sách
      tags:
        - Books
      responses:
        '200':
          description: Trả về danh sách sách thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_ListBooks'
    post:
      summary: Thêm một cuốn sách mới
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '201':
          description: Đã tạo sách thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_SingleBook'
        '400':
          description: Bad Resquest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/{id}:
    parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
        description: ID của cuốn sách
    get:
      summary: Lấy thông tin chi tiết một cuốn sách
      tags:
        - Books
      responses:
        '200':
          description: Trả về thông tin sách thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_SingleBook'
        '404':
          description: Không tìm thấy sách
          content: 
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Cập nhật thông tin sách
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_SingleBook'
        '404':
          description: Không tìm thấy sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa một cuốn sách
      tags:
        - Books
      responses:
        '200':
          description: Xóa sách thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_DeletedBook'
        '404':
          description: Không tìm thấy sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Đắc Nhân Tâm"
        author:
          type: string
          example: "Dale Carnegie"
          
    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
          example: "Nhà Giả Kim"
        author:
          type: string
          example: "Paulo Coelho"

    # --- CÁC FORMAT PHẢN HỒI CHUẨN HÓA ---
    SuccessResponse_ListBooks:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Lấy danh sách thành công"
        data:
          type: array
          items:
            $ref: '#/components/schemas/Book'
            
    SuccessResponse_SingleBook:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Thao tác thành công"
        data:
          $ref: '#/components/schemas/Book'

    SuccessResponse_DeletedBook:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Xóa sách thành công"
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Lỗi hoặc không tìm thấy"
        error:
          nullable: true
          example: null

